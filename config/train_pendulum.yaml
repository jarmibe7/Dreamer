# Config for training RSSM + policy to complete env task with Dreamer alg
env:
  # Gym environment id used for training and evaluation
  name: Pendulum-v1
  # Spatial size images will be resized to before feeding the encoder
  image_size: 64
  # If true, convert renderings to single-channel grayscale
  grayscale: false
  eval_render_mode: rgb_array

model:
  # Encoder latent size (output dim of ConvEncoder)
  enc_latent_size: 256
  # Size of stochastic latent variable z
  stochastic_size: 32
  # Size of deterministic RNN hidden state
  deterministic_size: 128
  past_length: 1
  pred_length: 5
  output_uncertainty: false
  reward_size: 1

  conv_params:
    in_image_shape: [3, 64, 64]
    out_image_shape: [3, 64, 64]
    enc_kernel_size: 2
    dec_kernel_size: 2
    stride: 2
    pad: 1

loss:
  # KLD loss multiplier
  recon_mult: 1e3
  # KLD minimum clip value
  beta: 1e-5
  free_nats: 0.0
  kld_anneal_mode: linear
  image_loss: mse
  reward_mult: 1.0

dreamer:
  # Number of steps to imagine into the future when computing actor/value updates
  imagination_horizon: 15
  # Discount factor for returns
  discount: 0.99
  # Lambda mixing parameter for lambda-returns (Eqn. 6)
  lambda: 0.95
  actor_hidden_size: 256
  value_hidden_size: 256
  actor_lr: 2e-4
  value_lr: 2e-4
  entropy_scale: 3e-2
  actor_grad_clip: 100.0
  value_grad_clip: 100.0

training:
  seed: 0
  device: cuda:0
  epochs: 2000
  batch_size: 64
  learning_rate: 2e-4
  buffer_capacity: 50000
  updates_per_epoch: 25
  start_training_after: 50
  grad_clip: 100.0
  max_episode_steps: 200
  exploration_noise: 0.0

evaluation:
  render_every_epochs: 100
  max_episode_steps: 200

checkpoint:
  run_root: runs
  save_every_epochs: 100
  final_weights_name: dreamer_final.pt
  load_weights_path: null
